
services:

  # Layer 1 — The Target
  vulnerable-app:
    build:
      context: ./vulnerable-app
      dockerfile: Dockerfile
    container_name: securebank-api
    ports:
      - "5000:5000"
    volumes:
      - app-logs:/app/logs
      - app-data:/app/data
    networks:
      - ir-network
    labels:
      - "ir.monitor=true"
      - "ir.layer=target"
    restart: unless-stopped


  # Layer 2 — The Eyes (ELK Stack)

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    container_name: ir-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
      - cluster.name=ir-cluster
    volumes:
      - es-data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    networks:
      - ir-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped


  logstash:
    image: docker.elastic.co/logstash/logstash:8.13.0
    container_name: ir-logstash
    volumes:
      - ./logstash/pipeline.conf:/usr/share/logstash/pipeline/logstash.conf:ro
      - app-logs:/app/logs:ro
    ports:
      - "5044:5044"
    networks:
      - ir-network
    depends_on:
      elasticsearch:
        condition: service_healthy
    restart: unless-stopped


  kibana:
    image: docker.elastic.co/kibana/kibana:8.13.0
    container_name: ir-kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    networks:
      - ir-network
    depends_on:
      elasticsearch:
        condition: service_healthy
    restart: unless-stopped


  filebeat:
    image: docker.elastic.co/beats/filebeat:8.13.0
    container_name: ir-filebeat
    user: root
    command: filebeat -e -strict.perms=false
    volumes:
      - ./filebeat/filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
      - app-logs:/app/logs:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - ir-network
    depends_on:
      elasticsearch:
        condition: service_healthy
    restart: unless-stopped


  # Layer 3 — ElastAlert Init (creates required indices)
  elastalert-init:
    image: curlimages/curl:latest
    container_name: ir-elastalert-init
    command: >
      sh -c "
      curl -s -X PUT http://elasticsearch:9200/elastalert_status &&
      curl -s -X PUT http://elasticsearch:9200/elastalert_status_error &&
      curl -s -X PUT http://elasticsearch:9200/elastalert_status_silence &&
      curl -s -X PUT http://elasticsearch:9200/elastalert_status_past &&
      curl -s -X PUT http://elasticsearch:9200/elastalert_status_runs
      "
    networks:
      - ir-network
    depends_on:
      elasticsearch:
        condition: service_healthy
    restart: "no"


  # Layer 3 — ElastAlert (alerting engine)
  elastalert:
    image: jertel/elastalert2:2.19.0
    container_name: ir-elastalert
    entrypoint: ["python", "-m", "elastalert.elastalert"]
    environment:
      - ES_HOST=elasticsearch
      - ES_PORT=9200
    volumes:
      - ./elastalert/config.yaml:/opt/elastalert/config.yaml:ro   # ✅ FILE mount
      - ./elastalert/rules:/opt/elastalert/rules:ro
      - elastalert-logs:/opt/elastalert/logs
    command: ["--config", "/opt/elastalert/config.yaml", "--verbose"]
    networks:
      - ir-network
    depends_on:
      elastalert-init:
        condition: service_completed_successfully
    restart: unless-stopped
networks:
  ir-network:
    driver: bridge
    name: ir-pipeline-network


# Volumes
volumes:
  es-data:
    driver: local
  app-logs:
    driver: local
  app-data:
    driver: local
  elastalert-logs:
    driver: local