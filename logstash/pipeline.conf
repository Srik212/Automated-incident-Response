# Logstash Pipeline — Automated IR Pipeline
# Receives logs from Filebeat, parses them, sends to Elasticsearch

input {
  beats {
    port => 5044
  }

  file {
    path => "/app/logs/securebank.log"
    start_position => "beginning"
    sincedb_path => "/dev/null"
    type => "securebank"
  }
}

filter {
  # Parse SecureBank API logs
  if [type] == "securebank" or [log][file][path] =~ "securebank" {

    # Parse the log format: timestamp level logger message
    grok {
      match => {
        "message" => "%{TIMESTAMP_ISO8601:log_timestamp} %{LOGLEVEL:log_level} %{WORD:logger_name} %{GREEDYDATA:log_message}"
      }
    }

    # Extract security-relevant fields from log messages
    if [log_message] =~ "LOGIN_FAILED" {
      mutate {
        add_field => {
          "event_type" => "login_failure"
          "security_relevant" => "true"
        }
      }
      grok {
        match => {
          "log_message" => "LOGIN_FAILED: Invalid credentials for '%{DATA:target_username}' — IP: %{IP:source_ip}"
        }
      }
    }

    if [log_message] =~ "LOGIN_SUCCESS" {
      mutate {
        add_field => {
          "event_type" => "login_success"
          "security_relevant" => "true"
        }
      }
    }

    if [log_message] =~ "ACCESS_DENIED" {
      mutate {
        add_field => {
          "event_type" => "access_denied"
          "security_relevant" => "true"
        }
      }
    }

    if [log_message] =~ "PRIVILEGE_ESCALATION_ATTEMPT" {
      mutate {
        add_field => {
          "event_type" => "privilege_escalation"
          "security_relevant" => "true"
          "severity" => "critical"
        }
      }
    }

    if [log_message] =~ "TRANSFER_ERROR" {
      mutate {
        add_field => {
          "event_type" => "transfer_error"
          "security_relevant" => "true"
        }
      }
    }

    if [log_message] =~ "ADMIN_CONFIG" {
      mutate {
        add_field => {
          "event_type" => "admin_config_change"
          "security_relevant" => "true"
          "severity" => "high"
        }
      }
    }

    # Add metadata
    mutate {
      add_field => {
        "pipeline" => "ir-pipeline"
        "source_app" => "securebank-api"
      }
    }

    # Parse timestamp
    date {
      match => ["log_timestamp", "yyyy-MM-dd HH:mm:ss,SSS", "ISO8601"]
      target => "@timestamp"
    }
  }

  # Parse Docker container logs
  if [container][name] {
    mutate {
      add_field => {
        "container_name" => "%{[container][name]}"
        "pipeline" => "ir-pipeline"
      }
    }
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "ir-logs-%{+YYYY.MM.dd}"
  }

  # Also output security-relevant events to a separate index
  if [security_relevant] == "true" {
    elasticsearch {
      hosts => ["http://elasticsearch:9200"]
      index => "ir-security-events-%{+YYYY.MM.dd}"
    }
  }
}