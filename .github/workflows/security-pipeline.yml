name: SecureBank Security Pipeline
permissions:
  contents: read
  security-events: write
  pull-requests: read
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  # Gate 1 — Secret Scanning (Gitleaks)
  secret-scanning:
    name: "Gate 1 — Secret Scanning"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Gate 2 — SAST (Bandit)

  sast:
    name: "Gate 2 — SAST (Bandit)"
    runs-on: ubuntu-latest
    needs: secret-scanning
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Bandit
        run: pip install bandit[toml]

      - name: Run Bandit scan
        run: |
          bandit -r vulnerable-app/ -f json -o bandit-report.json || true
          bandit -r vulnerable-app/ -f txt
        continue-on-error: false

      - name: Upload Bandit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-sast-report
          path: bandit-report.json


  # Gate 3 - SCA
  sca:
    name: "Gate 3 - SCA"
    runs-on: ubuntu-latest
    needs: sast
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Install dependencies
        run: pip install -r vulnerable-app/requirements.txt

      - name: Run Safety check
        run: safety check --full-report --json > safety-report.json || true
        continue-on-error: false

      - name: Upload Safety report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: safety-sca-report
          path: safety-report.json

  # Gate 4 - Container Scanning (Trivy)

  trivy:
    name: "Gate 4 - Container Scanning (Trivy)"
    runs-on: ubuntu-latest
    needs: sast
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Trivy
        uses: aquasecurity/trivy-action@v0.2.0

      - name: Build Docker image
        run: |
          cd vulnerable-app
          docker build -t securebank-app:vulnerable .

      - name: Run Trivy scan
        run: trivy image --format json --output trivy-report.json securebank-app:vulnerable || true
        continue-on-error: false

      - name: Upload Trivy report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-container-scan-report
          path: trivy-report.json

  # Gate 5 - checkov - IaC Scanning
  iac-scanning:
    name: "Gate 5 - checkov - IaC Scanning"
    runs-on: ubuntu-latest
    needs: sast
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install checkov
        run: pip install checkov

      - name: Run Checkov IaC scan
        uses: bridgecrewio/checkov-action@master
        with:
          directory: .
          framework: terraform,dockerfile,kubernetes,github_actions,secrets,bicep,cloudformation
          output_format: sarif
          output_file_path: checkov-results.sarif
          soft_fail: false
          skip_check: CKV_DOCKER_2,CKV_DOCKER_3 # Adjust skip list as needed
          download_external_modules: true

      - name: Upload Checkov SARIF report
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: checkov-results.sarif
          category: checkov

  # Gate 6 - Owasp Zap - DAST
  dast:
    name: "Gate 6 - OWASP ZAP - DAST"
    runs-on: ubuntu-latest
    needs: [sca, trivy, iac-scanning]
    steps:
      - name: Set up OWASP ZAP
        run: |
          docker pull ghcr.io/zaproxy/zaproxy:latest
          docker run -d --name zap -p 8080:8080 ghcr.io/zaproxy/zaproxy:latest zap.sh -daemon -port 8080 -host 0.0.0.0
          sleep 10

      - name: Start vulnerable app
        run: |
          cd vulnerable-app
          pip install -r requirements.txt
          python app.py &
          sleep 5

      - name: Run OWASP ZAP scan
        run: |
          docker exec zap zap-cli quick-scan --self-signed http://localhost:5000 || true
        continue-on-error: false

      - name: Export ZAP report
        run: |
          docker cp zap:/home/zap/report.json zap-report.json || echo '{"scans":[]}' > zap-report.json


  # Gate 7 - SBOM Generation
  sbom-generation:
    name: "Gate 7 - SBOM Generation"
    runs-on: ubuntu-latest
    needs: trivy
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Syft
        uses: anchore/syft-action@v0.15.0

      - name: Generate SBOM with Syft
        run: syft . -o spdx-json > sbom.json || true
        continue-on-error: false

      - name: Upload SBOM report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sbom-report
